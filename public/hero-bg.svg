<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.8" fill="#D97706" opacity="0.18"/>
    </pattern>
    <linearGradient id="amberBlob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="amberBlob2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="indigoBlob" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="emeraldBlob" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
  </defs>

  <!-- Dot grid background -->
  <rect width="1600" height="900" fill="url(#dotGrid)"/>

  <!-- Large amber blob — top right, main hero element -->
  <path
    d="M 1120 -80
       C 1340 -140 1660 10 1645 240
       C 1632 420 1490 500 1280 472
       C 1070 444 930 315 968 148
       C 1003 -10 900 -20 1120 -80 Z"
    fill="url(#amberBlob1)"
    opacity="0.88"
  />

  <!-- Secondary amber blob — bottom right, overlapping -->
  <path
    d="M 1380 560
       C 1510 510 1660 590 1648 740
       C 1637 860 1500 910 1340 878
       C 1185 846 1130 756 1190 648
       C 1243 552 1250 610 1380 560 Z"
    fill="url(#amberBlob2)"
    opacity="0.75"
  />

  <!-- Indigo blob — left side, partially off-canvas -->
  <path
    d="M -120 200
       C 30 90 240 140 278 320
       C 314 480 200 608 30 618
       C -120 628 -220 500 -196 358
       C -172 226 -270 310 -120 200 Z"
    fill="url(#indigoBlob)"
    opacity="0.55"
  />

  <!-- Indigo small circle accent -->
  <circle cx="48" cy="148" r="56" fill="#818CF8" opacity="0.45"/>

  <!-- Emerald blob — bottom left -->
  <path
    d="M 320 820
       C 430 768 610 790 648 868
       C 682 936 594 976 444 966
       C 304 956 210 900 244 846
       C 272 802 210 872 320 820 Z"
    fill="url(#emeraldBlob)"
    opacity="0.78"
  />

  <!-- Emerald small circle — mid left -->
  <circle cx="180" cy="720" r="44" fill="#34D399" opacity="0.5"/>

  <!-- Abstract direction chevrons (strategy/growth motif) -->
  <path
    d="M 760 680 L 820 620 L 880 680"
    stroke="#F59E0B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"
  />
  <path
    d="M 790 720 L 850 660 L 910 720"
    stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"
  />

  <!-- Abstract concentric arcs (growth/progress motif) -->
  <path d="M 580 900 Q 680 760 820 720" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M 560 900 Q 660 730 820 680" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.28"/>
  <path d="M 540 900 Q 640 700 820 640" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.18"/>

  <!-- White circles — highlight/float elements -->
  <circle cx="1050" cy="60" r="40" fill="white" opacity="0.35"/>
  <circle cx="930" cy="210" r="22" fill="white" opacity="0.45"/>
  <circle cx="1420" cy="320" r="32" fill="white" opacity="0.3"/>
  <circle cx="1520" cy="130" r="18" fill="white" opacity="0.4"/>

  <!-- Small amber circles — decorative -->
  <circle cx="460" cy="100" r="14" fill="#FBBF24" opacity="0.65"/>
  <circle cx="640" cy="160" r="9" fill="#FCD34D" opacity="0.7"/>
  <circle cx="700" cy="80" r="6" fill="#F59E0B" opacity="0.55"/>
  <circle cx="380" cy="200" r="11" fill="#FDE68A" opacity="0.6"/>

  <!-- Small indigo circles — decorative -->
  <circle cx="350" cy="760" r="12" fill="#818CF8" opacity="0.55"/>
  <circle cx="490" cy="820" r="8" fill="#A5B4FC" opacity="0.6"/>

  <!-- Dot cluster — top right corner -->
  <g fill="#D97706" opacity="0.5">
    <circle cx="1340" cy="60" r="3.5"/>
    <circle cx="1374" cy="60" r="3.5"/>
    <circle cx="1408" cy="60" r="3.5"/>
    <circle cx="1442" cy="60" r="3.5"/>
    <circle cx="1340" cy="94" r="3.5"/>
    <circle cx="1374" cy="94" r="3.5"/>
    <circle cx="1408" cy="94" r="3.5"/>
    <circle cx="1442" cy="94" r="3.5"/>
    <circle cx="1340" cy="128" r="3.5"/>
    <circle cx="1374" cy="128" r="3.5"/>
    <circle cx="1408" cy="128" r="3.5"/>
    <circle cx="1442" cy="128" r="3.5"/>
  </g>

  <!-- Dot cluster — bottom left -->
  <g fill="#059669" opacity="0.4">
    <circle cx="100" cy="820" r="3"/>
    <circle cx="130" cy="820" r="3"/>
    <circle cx="160" cy="820" r="3"/>
    <circle cx="100" cy="850" r="3"/>
    <circle cx="130" cy="850" r="3"/>
    <circle cx="160" cy="850" r="3"/>
  </g>

  <!-- Abstract upward bars (growth chart motif, no numbers/money) -->
  <rect x="490" y="560" width="18" height="80" rx="9" fill="#FBBF24" opacity="0.4"/>
  <rect x="520" y="520" width="18" height="120" rx="9" fill="#F59E0B" opacity="0.45"/>
  <rect x="550" y="490" width="18" height="150" rx="9" fill="#FBBF24" opacity="0.35"/>
  <rect x="580" y="460" width="18" height="180" rx="9" fill="#FCD34D" opacity="0.3"/>
</svg>
